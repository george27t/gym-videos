const categories = [
  { key:"all", label:"הכל", icon:"⚡", isStretch:false },
  { key:"חזה", label:"חזה", icon:"💪", isStretch:false },
  { key:"גב", label:"גב", icon:"🏋️", isStretch:false },
  { key:"כתפיים", label:"כתפיים", icon:"🏆", isStretch:false },
  { key:"ידיים", label:"ידיים", icon:"✊", isStretch:false },
  { key:"רגליים וישבן", label:"רגליים וישבן", icon:"🦵", isStretch:false },
  { key:"בטן וליבה", label:"בטן וליבה", icon:"🔥", isStretch:false },
  { key:"כל הגוף / בית", label:"כל הגוף / בית", icon:"⚡", isStretch:false },
  { key:"יציבה ומתיחות", label:"יציבה ומתיחות", icon:"🧘", isStretch:true },
  { key:"טעויות נפוצות", label:"טעויות נפוצות", icon:"⚠️", isStretch:false },
  { key:"גומיות התנגדות", label:"גומיות התנגדות", icon:"🟣", isStretch:false },
];

let activeCategory = "all";
let searchQuery = "";

function getYTId(url) {
  if (!url) return null;

  const patterns = [
    /youtube\.com\/shorts\/([^?&/]+)/,
    /m\.youtube\.com\/shorts\/([^?&/]+)/,
    /youtube\.com\/watch\?v=([^?&/]+)/,
    /youtu\.be\/([^?&/]+)/,
    /youtube\.com\/embed\/([^?&/]+)/
  ];

  for (const pattern of patterns) {
    const match = url.match(pattern);
    if (match && match[1]) return match[1];
  }

  return null;
}

function catColorKey(cat) {
  const map = {
    "חזה": "chest",
    "גב": "back",
    "רגליים וישבן": "legs",
    "כתפיים": "shoulders",
    "ידיים": "arms",
    "בטן וליבה": "core",
    "כל הגוף / בית": "fullbody",
    "יציבה ומתיחות": "mobility"
  };

  return map[cat] || "default";
}

function renderCats() {
  const wrap = document.getElementById("catScroll");
  wrap.innerHTML = categories.map(c => {
    const count = c.key === "all" ? exercises.length : exercises.filter(e => e.category === c.key).length;
    const active = activeCategory === c.key ? "active" : "";
    const stretch = c.isStretch ? "stretch-pill" : "";
    return `<button class="cat-pill ${active} ${stretch}" onclick="selectCat('${c.key}')">
      ${c.icon} ${c.label}
      <span class="cat-count">${count}</span>
    </button>`;
  }).join("");
}

function selectCat(key) {
  activeCategory = key;
  renderCats();
  renderCards();
}

function renderCards() {
  const main = document.getElementById("mainContent");
  const q = searchQuery.toLowerCase();

  const filtered = exercises.filter(ex => {
    const matchCat = activeCategory === "all" || ex.category === activeCategory;
    const matchSearch =
      !q ||
      ex.nameHE.toLowerCase().includes(q) ||
      ex.nameEN.toLowerCase().includes(q) ||
      ex.category.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty">
      <div class="empty-emoji">🔍</div>
      <h3>לא נמצאו תרגילים</h3>
      <p>נסה חיפוש אחר או בחר קטגוריה אחרת</p>
      <button class="clear-btn" onclick="clearAll()">הצג הכל</button>
    </div>`;
    return;
  }

  const strength = filtered.filter(e => !e.isStretching);
  const stretch  = filtered.filter(e =>  e.isStretching);

  let html = "";

  if (strength.length > 0) {
    html += `<div class="section-header">
      <div class="section-bar strength"></div>
      <span class="section-title">תרגילי כוח</span>
      <span class="section-count">${strength.length} תרגילים</span>
    </div>`;
    html += `<div class="grid">${strength.map((ex, i) => cardHTML(ex, i)).join("")}</div>`;
  }

  if (stretch.length > 0) {
    html += `<div class="section-header">
      <div class="section-bar stretch"></div>
      <span class="section-title">יציבה ומתיחות</span>
      <span class="section-count">${stretch.length} תרגילים</span>
      <span class="stretch-badge">מומלץ לסיום אימון</span>
    </div>`;
    if (strength.length > 0) {
      html += `<div class="stretch-notice">🧘 תרגילי מתיחות ויציבה — מומלץ לבצע בסוף האימון לשיפור גמישות ויציבה</div>`;
    }
    html += `<div class="grid">${stretch.map((ex, i) => cardHTML(ex, i + strength.length)).join("")}</div>`;
  }

  main.innerHTML = html;
}

function cardHTML(ex, idx) {
  const ytId = getYTId(ex.videoURL);
  const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : "";
  const ck = catColorKey(ex.category);
  const delay = Math.min(idx * 40, 400);
  const btnClass = ex.isStretching ? "stretch-btn" : "strength-btn";
  const cardClass = ex.isStretching ? "card is-stretch" : "card";

  return `<div class="${cardClass}" style="animation-delay:${delay}ms" onclick="openModal(${ex.id})">
    <div class="card-thumb">
      ${thumb ? `<img src="${thumb}" alt="${ex.nameEN}" loading="lazy">` : ""}
      <div class="card-thumb-overlay"></div>
      <div class="card-play">
        <div class="play-btn">
          <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      ${ex.isStretching ? '<span class="stretch-tag">מתיחה</span>' : ""}
    </div>
    <div class="card-body">
      <div class="cat-badge cat-${ck}">
        <span class="cat-dot cat-dot-${ck}"></span>
        ${ex.category}
      </div>
      <div class="card-name-he">${ex.nameHE}</div>
      <div class="card-name-en">${ex.nameEN}</div>
      <button class="watch-btn ${btnClass}">▶ צפה בהדרכה</button>
    </div>
  </div>`;
}

function openModal(id) {
  const ex = exercises.find(e => e.id === id);
  if (!ex) return;
  const ck = catColorKey(ex.category);
  document.getElementById("modalNameHE").textContent = ex.nameHE;
  document.getElementById("modalNameEN").textContent = ex.nameEN;
  document.getElementById("modalBadge").innerHTML =
    `<div class="cat-badge cat-${ck}" style="margin-bottom:6px">
      <span class="cat-dot cat-dot-${ck}"></span>${ex.category}
    </div>`;
  document.getElementById("modalYTLink").href = ex.videoURL;
  const ytId = getYTId(ex.videoURL);
  document.getElementById("modalVideo").innerHTML = ytId
    ? `<iframe title="YouTube exercise video" src="https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`
    : `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#64748b">לא ניתן לטעון סרטון</div>`;
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
  document.getElementById("modalVideo").innerHTML = "";
  document.body.style.overflow = "";
}

function clearAll() {
  activeCategory = "all";
  searchQuery = "";
  document.getElementById("searchInput").value = "";
  renderCats();
  renderCards();
}

document.getElementById("searchInput").addEventListener("input", function() {
  searchQuery = this.value;
  renderCards();
});

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModalDirect(); });

renderCats();
renderCards();
</script>
</body>
</html>
